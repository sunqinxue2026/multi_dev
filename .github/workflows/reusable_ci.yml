name: Reusable CI

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.12"
      node_version:
        required: false
        type: string
        default: "20"
      backend_install_command:
        required: false
        type: string
        default: "uv sync --extra dev"
      backend_test_command:
        required: true
        type: string
      frontend_working_directory:
        required: false
        type: string
        default: "frontend"
      frontend_install_command:
        required: false
        type: string
        default: "npm install"
      frontend_build_command:
        required: false
        type: string
        default: "npm run build"

jobs:
  reusable-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: ${{ inputs.backend_install_command }}

      - name: Run backend checks
        run: ${{ inputs.backend_test_command }}

      - name: Build frontend
        if: ${{ inputs.frontend_working_directory != '' }}
        working-directory: ${{ inputs.frontend_working_directory }}
        run: |
          ${{ inputs.frontend_install_command }}
          ${{ inputs.frontend_build_command }}
